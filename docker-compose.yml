services:
  api:
    build: .
    container_name: api-meu-barzinho
    ports:
      - "8000:8000"
    networks:
      - meu-barzinho
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DATABASE_URL: mysql+aiomysql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:3306/${DB_NAME}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_MINUTES: 30
      URL_CORS: http://angular-docker:4200

networks:
  meu-barzinho:
    external: true
